services:
  web:
    build: .
    expose:
      - "5000"
  
  nginx:
    image: nginx:latest
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/cert.pem:/etc/nginx/cert.pem
      - ./nginx/key.pem:/etc/nginx/key.pem
    depends_on:
      - web